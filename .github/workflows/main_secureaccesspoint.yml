name: Deploy static site to Azure Web App - Secureaccesspoint

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_39036218995D4612A87938AE786A884F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_70EEF450CBFF42878EEB7E3A3B52BEC3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5EE8AB86BC6245BA8260183ADEB62905 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Secureaccesspoint'
          slot-name: 'Production'
          package: .          
